<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="frontend/css/grid.css" />
    <link rel="stylesheet" href="frontend/css/main.css" />
    <title>Valorant API</title>
  </head>
  <body>
    <header>
      <section class="header">
        <img src="frontend/images/valorant-2.svg" alt="valorant logo" />
        <nav class="navbar">
          <h1 class="hidden">Welcome to Valorant</h1>
          <div class="nav-container">
            <ul class="nav-link">
              <li>Duelist</li>
              <li>Sentinel</li>
              <li>Initiator</li>
              <li>Controller</li>
            </ul>
          </div>
        </nav>
      </section>
    </header>

    <main>
      <h2>Select your Agents</h2>
      <section id="duelist" class="duel-agents">
        <h3>DUELIST</h3>
        <div class="card-group">
          <div class="card card1">
            <img src="frontend/images/reyna_id_duel.jpg" />
            <img src="frontend/images/Reyna_artwork.webp" />
            <div class="content">
              <div class="name">Reyna</div>
            </div>
          </div>
          <div class="card card1">
            <img src="frontend/images/neon_id_duel.jpg" />
            <img src="frontend/images/Neon_artwork.webp" />
            <div class="content">
              <div class="name">Neon</div>
            </div>
          </div>
          <div class="card card1">
            <img src="frontend/images/iso_id_duel.jpg" />
            <img src="frontend/images/Iso_artwork.webp" />
            <div class="content">
              <div class="name">Iso</div>
            </div>
          </div>
        </div>
      </section>

      <section id="sentinel" class="sen-agents">
        <h3>SENTINEL</h3>
        <div class="card-group">
          <div class="card card1">
            <img src="frontend/images/chamber_id_sen.jpg" />
            <img src="frontend/images/Chamber_artwork.webp" />
            <div class="content">
              <div class="name">Chamber</div>
            </div>
          </div>
          <div class="card card1">
            <img src="frontend/images/killjoy_id_sen.jpg" />
            <img src="frontend/images/Killjoy_artwork.webp" />
            <div class="content">
              <div class="name">Killjoy</div>
            </div>
          </div>
          <div class="card card1">
            <img src="frontend/images/sage_id_sen.jpg" />
            <img src="frontend/images/Sage_artwork.webp" />
            <div class="content">
              <div class="name">Sage</div>
            </div>
          </div>
        </div>
      </section>

      <section id="initiator" class="int-agents">
        <h3>SENTINEL</h3>
        <div class="card-group">
          <div class="card card1">
            <img src="frontend/images/fade_id_int.jpg" />
            <img src="frontend/images/Fade_artwork.webp" />
            <div class="content">
              <div class="name">Fade</div>
            </div>
          </div>
          <div class="card card1">
            <img src="frontend/images/gekko_id_int.jpg" />
            <img src="frontend/images/Gekko_artwork.webp" />
            <div class="content">
              <div class="name">Gekko</div>
            </div>
          </div>
          <div class="card card1">
            <img src="frontend/images/skye_id_Int.jpg" />
            <img src="frontend/images/Skye_artwork.webp" />
            <div class="content">
              <div class="name">Skye</div>
            </div>
          </div>
        </div>
      </section>

      <section id="controller" class="con-agents">
        <h3>CONTROLLER</h3>
        <div class="card-group">
          <div class="card card1">
            <img src="frontend/images/viper_id_con.jpg" />
            <img src="frontend/images/Viper_artwork.webp" />
            <div class="content">
              <div class="name">Viper</div>
            </div>
          </div>
          <div class="card card1">
            <img src="frontend/images/omen_id_con.jpg" />
            <img src="frontend/images/Omen_artwork.webp" />
            <div class="content">
              <div class="name">Omen</div>
            </div>
          </div>
          <div class="card card1">
            <img src="frontend/images/clove_id_con.jpg" />
            <img src="frontend/images/Clove_artwork.webp" />
            <div class="content">
              <div class="name">Clove</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="foot-cont">
        <p>Valorant Gives You High Cortisol</p>
        <p>Made by 4 Vien Dan Dong#4444 and PoisonCroissant#amour</p>
      </div>
    </footer>
  </body>
</html>
